<!DOCTYPE html>

<head>

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica', Arial, sans-serif; }
        body { background: #108EE9; overflow: hidden; touch-action: none; -webkit-user-select: none; }
        #app-dana {
            position: fixed; inset: 0; background: #108EE9;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999;
        }
        .logo-dana { width: 130px; margin-bottom: 30px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1)); }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #fff; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-claim {
            width: 85%; padding: 18px; background: #fff; color: #108EE9;
            border: none; border-radius: 12px; font-weight: 800; font-size: 1.1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; transition: 0.3s;
        }
        .footer-text { color: #fff; margin-top: 25px; font-size: 0.85rem; opacity: 0.8; }
        
        /* Virus Elements */
        .v-box {
            position: fixed; width: 300px; height: 300px; border: 10px solid #f00;
            z-index: 88888; pointer-events: none; background: rgba(255,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .v-text {
            position: fixed; color: #0f0; font-family: 'Courier New';
            font-weight: 900; z-index: 99999; text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
